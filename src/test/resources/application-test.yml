# Integration-test profile. The datasource URL/username/password are injected
# at runtime by @DynamicPropertySource from the Testcontainers PostgreSQL.
spring:
  datasource:
    hikari:
      # Headroom for concurrency tests (each thread holds a connection while
      # waiting on the pessimistic row lock).
      maximum-pool-size: 30
      connection-timeout: 20000

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema; Hibernate only validates the mapping against it.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

# SqsClient is built at startup (no network call). Dummy values keep the
# context wiring valid without touching AWS/LocalStack during repository tests.
app:
  aws:
    sqs:
      region: sa-east-1
      endpoint: http://localhost:4566
      queue-url: http://localhost:4566/000000000000/conta-bancaria-criada
      access-key: test
      secret-key: test
      max-number-of-messages: 10
      wait-time-seconds: 10
      # Keep the scheduled poller OFF during tests (no LocalStack in CI).
      polling-enabled: false
      poll-delay-millis: 1000

logging:
  level:
    root: WARN
    br.com.renan.transactionauthorization: INFO
    org.flywaydb: INFO
    org.testcontainers: INFO
