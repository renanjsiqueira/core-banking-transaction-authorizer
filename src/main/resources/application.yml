spring:
  application:
    name: transaction-authorizer

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/authorizer}
    username: ${DB_USERNAME:authorizer}
    password: ${DB_PASSWORD:authorizer}
    hikari:
      pool-name: authorizer-pool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 3000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true

# --- AWS / SQS (account-created consumer) ---
aws:
  region: ${AWS_REGION:sa-east-1}
  # When running against LocalStack, set the endpoint; leave blank for real AWS.
  endpoint: ${AWS_ENDPOINT:http://localhost:4566}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:test}
    secret-key: ${AWS_SECRET_ACCESS_KEY:test}
  sqs:
    account-created-queue: ${SQS_ACCOUNT_CREATED_QUEUE:conta-bancaria-criada}
    # long-polling + batch settings tuned in the SQS phase
    max-messages: 10
    wait-time-seconds: 20
    visibility-timeout-seconds: 30

# --- Observability ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

logging:
  level:
    com.itau.authorizer: ${LOG_LEVEL:INFO}
