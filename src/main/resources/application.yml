spring:
  application:
    name: transaction-authorization

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/transaction_authorization}
    username: ${DB_USERNAME:app}
    password: ${DB_PASSWORD:app}
    hikari:
      pool-name: authorizer-pool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 3000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true

# --- AWS / SQS integration (account-created queue) ---
# Defaults resolve the real AWS regional endpoint and the default credentials
# provider chain (IAM role). The `local` profile overrides these for LocalStack.
app:
  aws:
    sqs:
      region: ${AWS_REGION:sa-east-1}
      endpoint: ${AWS_SQS_ENDPOINT:}
      queue-url: ${AWS_SQS_QUEUE_URL:}
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
      max-number-of-messages: 10
      wait-time-seconds: 10
      polling-enabled: ${SQS_POLLING_ENABLED:false}
      poll-delay-millis: ${SQS_POLL_DELAY_MILLIS:1000}

# --- Observability ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

# --- API documentation (springdoc / Swagger UI) ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

logging:
  level:
    br.com.renan.transactionauthorization: ${LOG_LEVEL:INFO}
