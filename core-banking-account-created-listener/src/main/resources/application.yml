spring:
  application:
    name: core-banking-account-created-listener

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/transaction_authorization}
    username: ${DB_USERNAME:app}
    password: ${DB_PASSWORD:app}
    hikari:
      pool-name: account-created-listener-pool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 3000

  jpa:
    open-in-view: false
    hibernate:
      # The API owns the schema; this service only validates its mapping.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # Schema is owned and migrated by core-banking-transaction-authorizer-api.
  flyway:
    enabled: false

# --- AWS / SQS integration (account-created queue) ---
app:
  aws:
    sqs:
      region: ${AWS_REGION:sa-east-1}
      endpoint: ${AWS_SQS_ENDPOINT:}
      queue-url: ${AWS_SQS_QUEUE_URL:}
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
      max-number-of-messages: 10
      wait-time-seconds: 10
      polling-enabled: ${SQS_POLLING_ENABLED:false}
      polling-delay-ms: ${SQS_POLLING_DELAY_MS:1000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

logging:
  level:
    br.com.renan.corebanking: ${LOG_LEVEL:INFO}
