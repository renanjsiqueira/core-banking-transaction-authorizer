spring:
  datasource:
    hikari:
      maximum-pool-size: 5
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false

app:
  aws:
    sqs:
      region: sa-east-1
      endpoint: http://localhost:4566
      queue-url: http://localhost:4566/000000000000/conta-bancaria-criada
      access-key: test
      secret-key: test
      polling-enabled: false
      max-number-of-messages: 10
      wait-time-seconds: 10
      polling-delay-ms: 1000

logging:
  level:
    root: WARN
    br.com.renan.corebanking: INFO
    org.testcontainers: INFO
