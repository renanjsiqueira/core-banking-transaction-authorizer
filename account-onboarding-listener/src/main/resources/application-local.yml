# Local development profile: targets the docker-compose stack
# (PostgreSQL + LocalStack/SQS). Activate with: --spring.profiles.active=local
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/transaction_authorization
    username: app
    password: app
  flyway:
    enabled: false

app:
  aws:
    sqs:
      region: sa-east-1
      endpoint: http://localhost:4566
      queue-url: http://localhost:4566/000000000000/conta-bancaria-criada
      access-key: test
      secret-key: test
      max-number-of-messages: 10
      wait-time-seconds: 10
      polling-enabled: true
      poll-delay-millis: 1000

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    br.com.renan.corebanking: DEBUG
