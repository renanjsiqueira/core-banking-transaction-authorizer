# Local development profile: targets the docker-compose PostgreSQL.
# Activate with: --spring.profiles.active=local
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/transaction_authorization
    username: app
    password: app
  flyway:
    enabled: true

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    br.com.renan.corebanking: DEBUG
