spring:
  application:
    name: transaction-authorization-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/transaction_authorization}
    username: ${DB_USERNAME:app}
    password: ${DB_PASSWORD:app}
    hikari:
      pool-name: authorization-api-pool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 3000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # This service OWNS the schema: Flyway runs here.
  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

logging:
  level:
    br.com.renan.corebanking: ${LOG_LEVEL:INFO}
